worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # Rate limit zone per PRD: 200 r/s
  limit_req_zone $binary_remote_addr zone=rez:10m rate=200r/s;

  upstream app {
    server app:8080;
  }

  server {
    listen 80;

    # Generic API passthrough (for /api/health etc.)
    location /api/ {
      proxy_pass http://app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Reservations: rate limit 200 r/s with burst=100 nodelay
    location /api/reservations {
      limit_req zone=rez burst=100 nodelay;
      proxy_pass http://app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Search: cache header per PRD (60s)
    location /api/search {
      add_header Cache-Control "public, max-age=60";
      proxy_pass http://app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
