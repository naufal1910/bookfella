spring:
  datasource:
    url: jdbc:h2:mem:booking;DB_CLOSE_DELAY=-1;MODE=Oracle;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
